version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "./internal/adapters/postgresql/queries/*.sql"
    schema: "./migrations"
    gen:
      go:
        package: "sqlc"
        out: "./internal/adapters/postgresql/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true # generate Querier interface
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamp"
            go_type: "time.Time"
          - db_type: "timestamptz"
            go_type: "time.Time"
