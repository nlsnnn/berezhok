version: '3'

# Глобальные переменные проекта
vars:
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v2.8.0'
  GCI_VERSION: 'v0.13.7'
  GOFUMPT_VERSION: 'v0.9.2'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'

tasks:
  install-formatters:
    desc: "Устанавливает форматтеры gci и gofumpt"
    cmds:
      - echo 'Устанавливаем gofumpt {{.GOFUMPT_VERSION}}...'
      - go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
      - echo 'Устанавливаем gci {{.GCI_VERSION}}...'
      - go install github.com/daixiang0/gci@{{.GCI_VERSION}}

  format:
    desc: "Форматирует весь проект gofumpt + gci"
    cmds:
      - echo "🧼 Форматируем через gofumpt ..."
      - go run mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}} -extra -w .
      - echo "🎯 Сортируем импорты через gci ..."
      - go run github.com/daixiang0/gci@{{.GCI_VERSION}} write -s standard -s default -s "prefix(github.com/nlsnnn/berezhok/)" .

  install-golangci-lint:
    desc: "Устанавливает golangci-lint"
    cmds:
      - echo "📦 Устанавливаем golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}

  lint:
    desc: "Запускает golangci-lint для всех модулей"
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}} run ./...

  tests:
    desc: "Запускает все тесты"
    cmds:
      - go test ./internal/... -v

  e2e_tests:
    desc: "Запускает E2E тесты API"
    cmds:
      - go test ./internal/tests/... -v -run TestAPI