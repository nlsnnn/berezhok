repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Go форматирование
  - repo: local
    hooks:
      - id: gofumpt
        name: gofumpt
        entry: gofumpt -extra -w
        language: system
        types: [go]
        require_serial: true

      - id: gci
        name: gci (import sorting)
        entry: gci write -s standard -s default -s "prefix(github.com/nlsnnn/berezhok/)"
        language: system
        types: [go]
        require_serial: true

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      - id: golangci-lint

  # ESLint (React/Vite)
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        entry: bash -c 'cd frontend && npx eslint .'
        language: system
        files: ^frontend/src/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false
